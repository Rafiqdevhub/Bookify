services:
  app:
    container_name: bookify-app
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-pk_test_YOUR_PUBLISHABLE_KEY}
        NEXT_PUBLIC_ASSISTANT_ID: ${NEXT_PUBLIC_ASSISTANT_ID:-YOUR_VAPI_ASSISTANT_ID}
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-YOUR_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-YOUR_SECRET_KEY}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/bookify}
      BLOB_READ_WRITE_TOKEN: ${BLOB_READ_WRITE_TOKEN:-YOUR_BLOB_READ_WRITE_TOKEN}
      NEXT_PUBLIC_ASSISTANT_ID: ${NEXT_PUBLIC_ASSISTANT_ID:-YOUR_VAPI_ASSISTANT_ID}
    depends_on:
      - mongodb
    restart: unless-stopped

  mongodb:
    container_name: bookify-mongodb
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

volumes:
  mongodb_data:
